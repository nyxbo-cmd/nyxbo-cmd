<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 60" width="100%" height="auto">
  <defs>
    <clipPath id="typeClip">
      <rect x="0" y="0" width="0" height="100%">
        <animate attributeName="width" values="0;700" dur="3s" begin="0s" fill="freeze" repeatCount="indefinite" keyTimes="0;0.8" keySplines="0.25 0.1 0.25 1" calcMode="spline"/>
        <!-- After typing, hold and then reset -->
        <animate attributeName="width" values="700;700;0" dur="8s" begin="3s" repeatCount="indefinite" keyTimes="0;0.8;1"/>
      </rect>
    </clipPath>
    <style>
      .cursor { animation: blink 0.8s infinite; }
      @keyframes blink { 0%,50%{ opacity:1; } 51%,100%{ opacity:0; } }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117" rx="8"/>

  <g clip-path="url(#typeClip)">
    <text x="15" y="55%" dominant-baseline="middle"
          font-family="monospace" font-size="22" fill="#58a6ff" font-weight="bold">
      SEO • Chatbots • Social Automation • Web 3D • Python • Dashboards • Data
    </text>
  </g>

  <!-- Blinking block cursor -->
  <rect x="695" y="12" width="10" height="40" fill="#58a6ff" class="cursor"/>
</svg>
